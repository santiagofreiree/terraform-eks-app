apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sysmarket
  namespace: development
spec:
  parentRefs:
  - name: aws-gateway
    namespace: aws-lb
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /longpolling
    backendRefs:
    - name: sysmarketlon
      port: 8072
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: sysmarket
      port: 8070

